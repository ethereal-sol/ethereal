<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Ethereal — 404</title>
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050607;
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --radius: 22px;
      --shadow: 0 18px 55px rgba(0,0,0,.74);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      --space: "Space Mono", var(--mono);
      --sa-left: env(safe-area-inset-left);
      --sa-right: env(safe-area-inset-right);
      --safeX: 16px;
      --frame-fill-top: rgba(0,0,0,.62);
      --frame-fill-bottom: rgba(0,0,0,.54);
      --card-fill-top: rgba(2,2,4,.58);
      --card-fill-bottom: rgba(0,0,0,.50);
      --glass-border-low: rgba(255,255,255,.025);
      --glass-border-hi: rgba(255,255,255,.22);
      --glass-blur: 22px;
      --glass-blur-soft: 18px;
      --glass-spec-top: rgba(255,255,255,.22);
      --glass-spec-bottom: rgba(0,0,0,.32);
      --glass-spec-inner: rgba(255,255,255,.025);
    }

    *{ box-sizing:border-box; }

    html,body{
      height:100%;
      width:100%;
      overflow-x: clip;
    }

    @supports not (overflow: clip){
      html,body{ overflow-x:hidden; }
    }

    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 70% 20%, rgba(255,255,255,.028), transparent 60%),
        radial-gradient(900px 700px at 20% 80%, rgba(255,255,255,.018), transparent 64%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-y:auto;
      -webkit-text-size-adjust: 100%;
    }

    canvas#bg{
      position:fixed;
      inset:0;
      z-index:0;
      width:100%;
      height:100%;
      pointer-events:none;
      opacity:.95;
    }

    .vignette{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0), rgba(0,0,0,.62) 70%, rgba(0,0,0,.84) 100%);
    }

    .svg-defs{
      position:absolute;
      width:0;
      height:0;
      overflow:hidden;
      pointer-events:none;
    }

    .stage{
      position:relative;
      z-index:2;
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      --pad: clamp(16px, 3vw, 40px);
      padding-left: var(--safeX);
      padding-right: var(--safeX);
      padding-top: calc(var(--pad) + env(safe-area-inset-top));
      padding-bottom: calc(var(--pad) + env(safe-area-inset-bottom));
    }

    .frame,
    .card{
      position:relative;
      isolation:isolate;
      border:1px solid transparent;
      overflow:hidden;
      background-repeat:no-repeat;
      background-origin:padding-box, border-box;
      background-clip:padding-box, border-box;
      contain:layout style;
      box-shadow:
        var(--shadow),
        inset 1.5px 1.5px 0 -1px var(--glass-spec-top),
        inset -1px -1px 1px -1px var(--glass-spec-bottom),
        inset 0 0 22px var(--glass-spec-inner);
    }

    .frame{
      width:min(920px, 100%);
      margin:0 auto;
      border-radius:var(--radius);
      background:
        linear-gradient(180deg, var(--frame-fill-top), var(--frame-fill-bottom)) padding-box,
        linear-gradient(
          90deg,
          var(--glass-border-low) 0%,
          var(--glass-border-low) 22%,
          rgba(255,255,255,.08) 28%,
          var(--glass-border-hi) 34%,
          rgba(140,140,140,.14) 40%,
          rgba(255,255,255,.07) 47%,
          var(--glass-border-low) 54%,
          var(--glass-border-low) 100%
        ) border-box;
      background-size:100% 100%, 240% 100%;
      background-position:0 0, 140% 0;
      opacity:0;
      transform:translateY(18px) scale(.985);
      animation:
        frameIn .9s cubic-bezier(.16,.84,.28,1) .1s forwards,
        borderSweep 9s cubic-bezier(.45,.05,.55,.95) 1.2s infinite;
    }

    .card{
      border-radius:var(--radius);
      padding:16px;
      background:
        linear-gradient(180deg, var(--card-fill-top), var(--card-fill-bottom)) padding-box,
        linear-gradient(
          90deg,
          rgba(255,255,255,.022) 0%,
          rgba(255,255,255,.022) 24%,
          rgba(255,255,255,.06) 30%,
          rgba(255,255,255,.16) 35%,
          rgba(110,110,110,.10) 41%,
          rgba(255,255,255,.05) 48%,
          rgba(255,255,255,.022) 55%,
          rgba(255,255,255,.022) 100%
        ) border-box;
      background-size:100% 100%, 250% 100%;
      background-position:0 0, 140% 0;
      animation:borderSweep 10s cubic-bezier(.45,.05,.55,.95) infinite;
    }

    .frame::before,
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      border-radius:inherit;
      pointer-events:none;
      backdrop-filter: blur(var(--glass-blur)) saturate(115%) contrast(108%) brightness(82%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(115%) contrast(108%) brightness(82%);
    }

    @supports (backdrop-filter: url(#liquidGlass)){
      .frame::before{
        backdrop-filter: url(#liquidGlass) blur(var(--glass-blur)) saturate(120%) contrast(110%) brightness(80%);
      }

      .card::before{
        backdrop-filter: url(#liquidGlassSoft) blur(var(--glass-blur-soft)) saturate(118%) contrast(109%) brightness(82%);
      }
    }

    .frame::after,
    .card::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      border-radius:inherit;
      pointer-events:none;
      background:
        radial-gradient(160% 90% at -5% -20%, rgba(255,255,255,.08), transparent 44%),
        radial-gradient(120% 60% at 110% -10%, rgba(255,255,255,.035), transparent 46%),
        radial-gradient(130% 90% at 50% 130%, rgba(0,0,0,.55), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.015), rgba(0,0,0,.08) 40%, rgba(0,0,0,.22) 100%);
      opacity:.92;
    }

    .card::after{
      background:
        radial-gradient(140% 80% at -5% -10%, rgba(255,255,255,.06), transparent 46%),
        radial-gradient(110% 55% at 110% -10%, rgba(255,255,255,.025), transparent 48%),
        radial-gradient(120% 80% at 50% 130%, rgba(0,0,0,.48), transparent 56%),
        linear-gradient(180deg, rgba(255,255,255,.012), rgba(0,0,0,.06) 38%, rgba(0,0,0,.18) 100%);
      opacity:.90;
    }

    .frame-inner,
    .card > *{
      position:relative;
      z-index:1;
    }

    .card > .error-grid,
    .error-grid > .code404,
    .error-grid > .error-copy{
      position:relative;
      z-index:1;
    }

    .frame-inner{
      padding:clamp(18px, 3vw, 34px);
      border-radius:var(--radius);
    }

    @keyframes frameIn{
      0%{
        opacity:0;
        transform:translateY(18px) scale(.985);
        filter:blur(6px);
      }
      60%{ filter:blur(0); }
      100%{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
      }
    }

    @keyframes contentIn{
      0%{
        opacity:0;
        transform:translateY(12px);
      }
      100%{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes borderSweep{
      0%{ background-position:0 0, 140% 0; }
      55%{ background-position:0 0, -40% 0; }
      55.01%{ background-position:0 0, 140% 0; }
      100%{ background-position:0 0, 140% 0; }
    }

    .logo{
      margin:0 0 6px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }

    .logo-svg{
      display:block;
      width:min(560px, 100%);
      height:clamp(34px, 3.4vw, 52px);
      overflow:visible;
    }

    .logo-svg text{
      font-family:var(--space);
      font-weight:300;
      letter-spacing:-0.02em;
      text-rendering:geometricPrecision;
      paint-order:stroke fill;
    }

    .logo-fill{ fill:url(#logoFillGradient); }

    .logo-glow{
      fill:rgba(255,255,255,.92);
      mix-blend-mode:screen;
      pointer-events:none;
      filter:
        blur(.4px)
        drop-shadow(0 0 3px rgba(255,255,255,.85))
        drop-shadow(0 0 10px rgba(255,255,255,.55))
        drop-shadow(0 0 22px rgba(255,255,255,.32))
        drop-shadow(0 0 44px rgba(255,255,255,.18));
      opacity:.22;
      animation:brandGlow 4.8s cubic-bezier(.4,0,.6,1) infinite;
    }

    .logo-base{
      fill:none;
      stroke:rgba(255,255,255,.14);
      stroke-width:1.7;
      stroke-linejoin:round;
      stroke-linecap:round;
      opacity:.95;
    }

    .logo-glow-flicker{
      fill:rgba(255,255,255,.75);
      mix-blend-mode:screen;
      pointer-events:none;
      opacity:0;
      animation:brandFlicker 6.4s ease-in-out infinite;
    }

    .logo-shimmer{
      fill:url(#logoShimmerGradient);
      mix-blend-mode:screen;
      pointer-events:none;
    }

    @keyframes brandGlow{
      0%, 100%{ opacity:.18; }
      25%{ opacity:.42; }
      50%{ opacity:.78; }
      75%{ opacity:.36; }
    }

    @keyframes brandFlicker{
      0%, 14%, 100%{ opacity:0; }
      15%{ opacity:.55; }
      16%{ opacity:.08; }
      17%{ opacity:.62; }
      19%{ opacity:0; }
      48%, 54%{ opacity:0; }
      49%{ opacity:.38; }
      50%{ opacity:.05; }
      51%{ opacity:.52; }
      52%{ opacity:.15; }
      53%{ opacity:.4; }
    }

    .glitch-layer{
      pointer-events:none;
    }

    .glitch-slice,
    .glitch-burst,
    .glitch-ghost{
      font-family:var(--space);
      font-weight:300;
      letter-spacing:-0.02em;
      opacity:0;
      pointer-events:none;
    }

    .glitch-slice{
      fill:url(#logoFillGradient);
    }

    .glitch-slice-1{ clip-path: inset(0 0 78% 0); }
    .glitch-slice-2{ clip-path: inset(24% 0 56% 0); }
    .glitch-slice-3{ clip-path: inset(52% 0 28% 0); }
    .glitch-slice-4{ clip-path: inset(76% 0 0 0); }

    .glitch-burst-bright{
      fill:rgba(255,255,255,.95);
      mix-blend-mode:screen;
      filter:blur(.4px) drop-shadow(0 0 6px rgba(255,255,255,.55));
    }

    .glitch-burst-shadow{
      fill:rgba(0,0,0,.92);
      mix-blend-mode:multiply;
    }

    .glitch-burst-haze{
      fill:rgba(200,200,205,.75);
      mix-blend-mode:screen;
      filter:blur(1.4px);
    }

    .glitch-ghost{
      fill:rgba(255,255,255,.9);
      mix-blend-mode:screen;
      filter:blur(.6px);
    }

    .logo.glitch-slice-mode .glitch-slice{ opacity:1; }
    .logo.glitch-slice-mode .glitch-slice-1{ animation: glitchShiftA 220ms cubic-bezier(.2,1,.3,1) 1; }
    .logo.glitch-slice-mode .glitch-slice-2{ animation: glitchShiftB 220ms cubic-bezier(.2,1,.3,1) 1; }
    .logo.glitch-slice-mode .glitch-slice-3{ animation: glitchShiftC 220ms cubic-bezier(.2,1,.3,1) 1; }
    .logo.glitch-slice-mode .glitch-slice-4{ animation: glitchShiftD 220ms cubic-bezier(.2,1,.3,1) 1; }

    .logo.glitch-chroma-mode .glitch-burst-bright{ opacity:1; animation: burstBright 300ms cubic-bezier(.33,1,.68,1) 1; }
    .logo.glitch-chroma-mode .glitch-burst-shadow{ opacity:1; animation: burstShadow 300ms cubic-bezier(.33,1,.68,1) 1; }
    .logo.glitch-chroma-mode .glitch-burst-haze{ opacity:.75; animation: burstHaze 300ms cubic-bezier(.33,1,.68,1) 1; }

    .logo.glitch-jitter-mode .logo-svg{ animation: jitterLogo 220ms linear 1; }

    .logo.glitch-ghost-mode .glitch-ghost{ opacity:.55; animation: ghostTrail 260ms cubic-bezier(.22,.61,.36,1) 1; }

    .logo.glitch-tear-mode .glitch-slice-2,
    .logo.glitch-tear-mode .glitch-slice-3{
      opacity:1;
      animation: glitchTear 200ms cubic-bezier(.68,-.55,.27,1.55) 1;
    }

    @keyframes glitchShiftA{
      0%  { transform: translate(0, 0) skewX(0deg); }
      20% { transform: translate(-9px, -1px) skewX(-3deg); }
      45% { transform: translate(13px, 1px) skewX(2deg); }
      70% { transform: translate(-4px, 0) skewX(-1deg); }
      100%{ transform: translate(0, 0) skewX(0deg); }
    }

    @keyframes glitchShiftB{
      0%  { transform: translate(0, 0) skewX(0deg); }
      22% { transform: translate(14px, 1px) skewX(2deg); }
      48% { transform: translate(-11px, -1px) skewX(-3deg); }
      72% { transform: translate(6px, 0) skewX(1deg); }
      100%{ transform: translate(0, 0) skewX(0deg); }
    }

    @keyframes glitchShiftC{
      0%  { transform: translate(0, 0) skewX(0deg); }
      25% { transform: translate(-17px, 1px) skewX(-2deg); }
      55% { transform: translate(8px, 0) skewX(3deg); }
      80% { transform: translate(-3px, -1px) skewX(-1deg); }
      100%{ transform: translate(0, 0) skewX(0deg); }
    }

    @keyframes glitchShiftD{
      0%  { transform: translate(0, 0) skewX(0deg); }
      28% { transform: translate(11px, 0) skewX(1deg); }
      52% { transform: translate(-14px, 1px) skewX(-2deg); }
      78% { transform: translate(5px, -1px) skewX(2deg); }
      100%{ transform: translate(0, 0) skewX(0deg); }
    }

    @keyframes burstBright{
      0%  { transform: translate(0, 0) scale(1); opacity:.9; }
      30% { transform: translate(-18px, 1px) scale(1.02); opacity:1; }
      60% { transform: translate(-10px, -1px) scale(1.01); opacity:.8; }
      100%{ transform: translate(0, 0) scale(1); opacity:0; }
    }

    @keyframes burstShadow{
      0%  { transform: translate(0, 0); opacity:.9; }
      30% { transform: translate(18px, -1px); opacity:1; }
      60% { transform: translate(10px, 1px); opacity:.7; }
      100%{ transform: translate(0, 0); opacity:0; }
    }

    @keyframes burstHaze{
      0%  { transform: translate(0, 0) scale(1); opacity:.3; }
      50% { transform: translate(0, -1px) scale(1.025); opacity:.75; }
      100%{ transform: translate(0, 0) scale(1); opacity:0; }
    }

    @keyframes jitterLogo{
      0%   { transform: translate(0, 0); }
      15%  { transform: translate(-3px, 2px); }
      30%  { transform: translate(4px, -2px); }
      50%  { transform: translate(-2px, 3px); }
      70%  { transform: translate(3px, -1px); }
      85%  { transform: translate(-1px, 1px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes ghostTrail{
      0%  { opacity:0; transform: translate(-22px, 0) scale(1.025); filter: blur(1.2px); }
      40% { opacity:.6; transform: translate(0, 0) scale(1); filter: blur(.6px); }
      100%{ opacity:0; transform: translate(16px, 0) scale(.99); filter: blur(1px); }
    }

    @keyframes glitchTear{
      0%  { transform: translate(0, 0); }
      30% { transform: translate(-32px, 0); }
      60% { transform: translate(28px, 0); }
      100%{ transform: translate(0, 0); }
    }

    .sub{
      margin:10px 0 0;
      color:var(--muted);
      font-size:clamp(14px, 1.4vw, 16px);
      line-height:1.55;
      max-width:78ch;
      font-family:var(--space);
      font-weight:400;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      margin:18px 0;
    }

    .error-grid{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      text-align:center;
    }

    .code404{
      margin:0;
      font-family:Consolas, var(--mono);
      font-weight:700;
      letter-spacing:-.07em;
      font-size:clamp(90px, 17vw, 190px);
      line-height:.82;
      color:rgba(255,255,255,.92);
      text-shadow:
        0 0 3px rgba(255,255,255,.55),
        0 0 22px rgba(255,255,255,.18),
        0 22px 60px rgba(0,0,0,.7);
      white-space:nowrap;
    }

    .error-copy{
      min-width:0;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .error-title{
      margin:0;
      font-family:var(--space);
      font-size:clamp(17px, 2.1vw, 24px);
      line-height:1.18;
      letter-spacing:-.02em;
      color:rgba(255,255,255,.72);
    }





    .actions{
      display:flex;
      gap:12px;
      align-items:stretch;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      border:1px solid transparent;
      cursor:pointer;
      border-radius:999px;
      padding:14px 16px;
      min-height:52px;
      font-size:14px;
      font-weight:800;
      letter-spacing:.02em;
      color:rgba(255,255,255,.92);
      background:
        linear-gradient(180deg, rgba(14,15,19,.66), rgba(5,6,9,.58)) padding-box,
        linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.16), rgba(255,255,255,.06)) border-box;
      box-shadow:
        0 14px 38px rgba(0,0,0,.62),
        inset 1px 1px 0 0 rgba(255,255,255,.14),
        inset -1px -1px 0 0 rgba(0,0,0,.28),
        inset 0 0 20px rgba(255,255,255,.02);
      position:relative;
      isolation:isolate;
      overflow:hidden;
      transition:transform .28s cubic-bezier(.16,.84,.28,1), filter .22s ease, box-shadow .22s ease;
      user-select:none;
      touch-action:manipulation;
      flex:1 1 220px;
      max-width:360px;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .btn::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      border-radius:inherit;
      pointer-events:none;
      backdrop-filter:blur(14px) saturate(118%) contrast(108%) brightness(82%);
      -webkit-backdrop-filter:blur(14px) saturate(118%) contrast(108%) brightness(82%);
    }

    @supports (backdrop-filter: url(#liquidGlassSoft)){
      .btn::before{
        backdrop-filter:url(#liquidGlassSoft) blur(14px) saturate(120%) contrast(110%) brightness(80%);
      }
    }

    .btn::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      border-radius:inherit;
      pointer-events:none;
      background:radial-gradient(140px 70px at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,.14), transparent 60%);
      opacity:0;
      transition:opacity .3s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.12);
      box-shadow:
        0 18px 46px rgba(0,0,0,.68),
        inset 1px 1px 0 0 rgba(255,255,255,.18),
        inset -1px -1px 0 0 rgba(0,0,0,.28),
        inset 0 0 22px rgba(255,255,255,.04);
    }

    .btn:hover::after{ opacity:1; }

    .btn:active{
      transform:translateY(0) scale(.985);
      transition:transform .08s ease;
    }

    .btn-inner{
      position:relative;
      z-index:2;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      min-width:0;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.88);
      box-shadow:
        0 0 0 2px rgba(255,255,255,.12),
        0 0 10px rgba(255,255,255,.45);
      flex:0 0 auto;
      transform-origin:center;
      animation:dotPulse 2.4s cubic-bezier(.4,0,.2,1) infinite;
    }

    @keyframes dotPulse{
      0%, 100%{
        transform:scale(1);
        box-shadow:
          0 0 0 2px rgba(255,255,255,.1),
          0 0 6px rgba(255,255,255,.3);
      }
      50%{
        transform:scale(1.22);
        box-shadow:
          0 0 0 2px rgba(255,255,255,.22),
          0 0 16px rgba(255,255,255,.75);
      }
    }

    .btn-text{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
      text-align:left;
    }

    .btn-title{
      font-family:var(--space);
      font-weight:800;
      font-size:14px;
      color:rgba(255,255,255,.94);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.05;
    }


    .frame .logo,
    .frame .sub,
    .frame .divider{
      opacity:0;
      animation:contentIn .7s cubic-bezier(.16,.84,.28,1) forwards;
    }

    .frame .card{
      opacity:0;
      animation:
        contentIn .7s cubic-bezier(.16,.84,.28,1) .7s forwards,
        borderSweep 10s cubic-bezier(.45,.05,.55,.95) infinite;
    }

    .frame .logo{ animation-delay:.35s; }
    .frame .sub{ animation-delay:.5s; }
    .frame .divider{ animation-delay:.6s; }

    :focus-visible{
      outline:2px solid rgba(255,255,255,.55);
      outline-offset:3px;
    }

    .vhs{
      position:fixed;
      inset:0;
      z-index:9;
      pointer-events:none;
      mix-blend-mode:overlay;
      opacity:.55;
    }

    .vhs::before{
      content:"";
      position:absolute;
      inset:-2px 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.045) 0px,
          rgba(255,255,255,.045) 1px,
          transparent 1px,
          transparent 3px
        );
      animation:vhsLinesJitter 4s ease-in-out infinite;
    }

    .vhs::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:140px;
      background:linear-gradient(
        180deg,
        transparent 0%,
        rgba(255,255,255,.035) 30%,
        rgba(255,255,255,.08) 50%,
        rgba(255,255,255,.035) 70%,
        transparent 100%
      );
      filter:blur(.5px);
      animation:vhsScan 11s cubic-bezier(.45,.05,.55,.95) infinite;
      top:-140px;
    }

    .vhs-glitch{
      position:fixed;
      inset:0;
      z-index:11;
      pointer-events:none;
      mix-blend-mode:screen;
      opacity:0;
      background:
        linear-gradient(180deg,
          transparent 0%, transparent 18%,
          rgba(255,255,255,.06) 18.2%, rgba(255,255,255,.06) 19.2%,
          transparent 19.4%, transparent 44%,
          rgba(255,255,255,.09) 44.2%, rgba(255,255,255,.09) 45%,
          transparent 45.2%, transparent 72%,
          rgba(255,255,255,.05) 72.2%, rgba(255,255,255,.05) 73.4%,
          transparent 73.6%
        );
      animation:vhsGlitch 12s cubic-bezier(.3,0,.7,1) infinite;
    }

    @keyframes vhsScan{
      0%{ transform:translateY(0); opacity:.3; }
      10%{ opacity:1; }
      90%{ opacity:1; }
      100%{ transform:translateY(calc(100vh + 280px)); opacity:.3; }
    }

    @keyframes vhsLinesJitter{
      0%, 100%{ transform:translateY(0); }
      25%{ transform:translateY(.3px); }
      50%{ transform:translateY(-.3px); }
      75%{ transform:translateY(.15px); }
    }

    @keyframes vhsGlitch{
      0%, 95%, 100%{
        opacity:0;
        transform:translateX(0);
      }
      95.8%{
        opacity:.5;
        transform:translateX(-3px);
      }
      96.4%{
        opacity:.25;
        transform:translateX(2px);
      }
      97.2%{
        opacity:.4;
        transform:translateX(-1px);
      }
      98%{
        opacity:.1;
        transform:translateX(0);
      }
    }

    @media (max-height:720px){
      .stage{ align-items:flex-start; }
    }

    @media (max-width:820px){
      :root{
        --glass-blur:12px;
        --glass-blur-soft:9px;
      }

      .frame::before,
      .card::before,
      .btn::before{
        backdrop-filter:blur(var(--glass-blur)) saturate(110%);
        -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(110%);
      }

      @supports (backdrop-filter: url(#liquidGlass)){
        .frame::before,
        .card::before,
        .btn::before{
          backdrop-filter:blur(var(--glass-blur)) saturate(110%);
          -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(110%);
        }
      }

      /* Border-sweep на .card поверх backdrop-filter — главный источник лагов. */
      .card{
        animation:none;
        background-position:0 0, 50% 0;
      }

      /* Повторный animation у .frame .card перебивает этот сброс — явно отменяем. */
      .frame .card{
        animation:contentIn .7s cubic-bezier(.16,.84,.28,1) .7s forwards;
        background-position:0 0, 50% 0;
      }

      .logo-glow{
        filter:
          blur(.3px)
          drop-shadow(0 0 3px rgba(255,255,255,.8))
          drop-shadow(0 0 10px rgba(255,255,255,.45));
      }

      .vhs{ opacity:.28; }
      .vhs::before{ animation:none; }
      .vhs::after{ display:none; }
      .vhs-glitch{ display:none; }

      .frame,
      .card{
        box-shadow:
          0 12px 34px rgba(0,0,0,.62),
          inset 1px 1px 0 -1px var(--glass-spec-top),
          inset 0 0 14px var(--glass-spec-inner);
      }

      .btn{
        max-width:none;
        box-shadow:
          0 10px 24px rgba(0,0,0,.58),
          inset 1px 1px 0 0 rgba(255,255,255,.14),
          inset -1px -1px 0 0 rgba(0,0,0,.28);
      }
    }

    @media (max-width:520px){
      :root{
        --glass-blur:10px;
        --glass-blur-soft:8px;
      }

      .frame,
      .card{ border-radius:18px; }
      .frame-inner{ padding:16px; }
      .divider{ margin:16px 0; }
      .card{ padding:14px; }
      .logo-svg{ height:clamp(32px, 10vw, 42px); }
      .sub{ font-size:13px; }
      .btn{ padding:12px 14px; min-height:48px; }

      /* Шиммер на таком размере не читается, а repaint стоит денег. */
      .logo-shimmer{ display:none; }
    }

    @media (pointer:coarse){
      .btn:hover{
        transform:none;
        filter:none;
        box-shadow:
          0 14px 38px rgba(0,0,0,.62),
          inset 1px 1px 0 0 rgba(255,255,255,.14),
          inset -1px -1px 0 0 rgba(0,0,0,.28),
          inset 0 0 20px rgba(255,255,255,.02);
      }

      .btn:hover::after{ opacity:0; }
    }

    @media (prefers-reduced-motion:reduce){
      .frame,
      .frame .logo,
      .frame .sub,
      .frame .divider,
      .frame .card,
      .dot,
      .logo-glow,
      .logo-glow-flicker,
      .vhs,
      .vhs::before,
      .vhs::after,
      .vhs-glitch{
        animation:none;
      }

      .frame,
      .frame .logo,
      .frame .sub,
      .frame .divider,
      .frame .card{
        opacity:1;
        transform:none;
      }

      .frame,
      .card{
        background-position:0 0, 52% 0;
      }

      .btn{
        transition:none;
      }

      .logo-glow{
        opacity:.4;
      }

      .logo-glow-flicker{
        opacity:0;
      }

      .glitch-layer{ display:none; }

      .vhs-glitch{
        display:none;
      }
    }
  </style>
</head>

<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <svg class="svg-defs" aria-hidden="true" focusable="false">
    <defs>
      <filter id="liquidGlass" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.014" numOctaves="2" seed="42" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="1.4" result="noiseBlur" />
        <feDisplacementMap in="SourceGraphic" in2="noiseBlur" scale="22" xChannelSelector="R" yChannelSelector="G" />
      </filter>

      <filter id="liquidGlassSoft" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.010 0.018" numOctaves="2" seed="17" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="1.1" result="noiseBlur" />
        <feDisplacementMap in="SourceGraphic" in2="noiseBlur" scale="14" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <main class="stage">
    <section class="frame" aria-label="404">
      <div class="frame-inner">
        <div class="logo" aria-label="Ethereal">
          <svg class="logo-svg" viewBox="0 0 820 120" preserveAspectRatio="xMinYMid meet" aria-hidden="true">
            <defs>
              <linearGradient id="logoFillGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="48%" stop-color="#b8b8b8" />
                <stop offset="100%" stop-color="#3e3e3e" />
              </linearGradient>

              <linearGradient id="logoShimmerGradient" gradientUnits="userSpaceOnUse" x1="-300" y1="0" x2="-100" y2="0">
                <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                <stop offset="42%" stop-color="rgba(255,255,255,0)" />
                <stop offset="50%" stop-color="rgba(255,255,255,.95)" />
                <stop offset="58%" stop-color="rgba(255,255,255,0)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                <animate attributeName="x1" values="-300;1020;1020;-300" keyTimes="0;0.35;1;1" dur="6.2s" calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1; 0 0 0 0" repeatCount="indefinite" />
                <animate attributeName="x2" values="-100;1220;1220;-100" keyTimes="0;0.35;1;1" dur="6.2s" calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1; 0 0 0 0" repeatCount="indefinite" />
              </linearGradient>

              <filter id="logoShimmerGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.2" result="b" />
                <feMerge>
                  <feMergeNode in="b" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>

            <text class="logo-glow" x="0" y="94" font-size="96">Ethereal</text>
            <text class="logo-fill" x="0" y="94" font-size="96">Ethereal</text>
            <text class="logo-base" x="0" y="94" font-size="96">Ethereal</text>
            <text class="logo-glow-flicker" x="0" y="94" font-size="96">Ethereal</text>
            <text class="logo-shimmer" x="0" y="94" font-size="96" filter="url(#logoShimmerGlow)">Ethereal</text>
            <g class="glitch-layer" aria-hidden="true">
              <text class="glitch-slice glitch-slice-1" x="0" y="94" font-size="96">Ethereal</text>
              <text class="glitch-slice glitch-slice-2" x="0" y="94" font-size="96">Ethereal</text>
              <text class="glitch-slice glitch-slice-3" x="0" y="94" font-size="96">Ethereal</text>
              <text class="glitch-slice glitch-slice-4" x="0" y="94" font-size="96">Ethereal</text>
              <text class="glitch-burst glitch-burst-bright" x="0" y="94" font-size="96">Ethereal</text>
              <text class="glitch-burst glitch-burst-shadow" x="0" y="94" font-size="96">Ethereal</text>
              <text class="glitch-burst glitch-burst-haze" x="0" y="94" font-size="96">Ethereal</text>
              <text class="glitch-ghost" x="0" y="94" font-size="96">Ethereal</text>
            </g>
          </svg>
        </div>

        <p class="sub">Никаких следов. Лишь результат.</p>

        <div class="divider"></div>

        <article class="card">
          <div class="error-grid">
            <div class="code404" aria-hidden="true">404</div>
            <div class="error-copy">
              <h1 class="error-title">Страница не найдена</h1>
              <div class="actions">
                <a class="btn" id="homeBtn" href="./" aria-label="Вернуться на главную страницу">
                  <span class="btn-inner">
                    <span class="dot" aria-hidden="true"></span>
                    <span class="btn-text">
                      <span class="btn-title">Вернуться на главную</span>
                    </span>
                  </span>
                </a>
              </div>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>

  <div class="vhs" aria-hidden="true"></div>
  <div class="vhs-glitch" aria-hidden="true"></div>

  <script>
    function applySafeX(){
      const root = document.documentElement;
      const cs = getComputedStyle(root);
      const left = parseFloat(cs.getPropertyValue("--sa-left")) || 0;
      const right = parseFloat(cs.getPropertyValue("--sa-right")) || 0;
      const x = Math.max(16, left, right);
      root.style.setProperty("--safeX", x + "px");
    }

    applySafeX();
    window.addEventListener("resize", applySafeX, { passive:true });
    window.addEventListener("orientationchange", applySafeX);


    if(!window.matchMedia("(pointer: coarse)").matches){
      document.querySelectorAll(".btn").forEach((btn) => {
        btn.addEventListener("pointermove", (e) => {
          const r = btn.getBoundingClientRect();
          const mx = ((e.clientX - r.left) / r.width) * 100;
          const my = ((e.clientY - r.top) / r.height) * 100;
          btn.style.setProperty("--mx", mx + "%");
          btn.style.setProperty("--my", my + "%");
        }, { passive:true });
      });
    }

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const bg = document.getElementById("bg");
    const ctx = bg && bg.getContext ? bg.getContext("2d", { alpha:false, desynchronized:true }) : null;

    if(ctx){
      const glyphs = "01{}[]();=>/\\*+-_#@~$<>|:^.,";
      const keywords = ["ethereal::", "void()", "compile()", "async", "null", "0xDEAD", "signal", "stack", "heap"];
      const mqMobile = window.matchMedia("(max-width: 820px)");
      const mqSmall = window.matchMedia("(max-width: 520px)");

      let columns = [];
      let fontSize = 14;
      let colWidth = 12;
      let cachedFont = "";
      let monoFamily = "ui-monospace, SFMono-Regular, Menlo, monospace";
      let lastT = 0;
      let running = true;

      function rand(min,max){ return Math.random() * (max - min) + min; }
      function randi(min,max){ return Math.floor(rand(min, max + 1)); }

      // Вызываем один раз при старте — getComputedStyle внутри draw() был бы force reflow на каждый кадр.
      try{
        const v = getComputedStyle(document.documentElement).getPropertyValue("--mono").trim();
        if(v) monoFamily = v;
      }catch(e){ /* ignore */ }

      function resizeBg(){
        const dprCap = mqSmall.matches ? 1 : (mqMobile.matches ? 1.15 : 1.4);
        const DPR = Math.min(dprCap, window.devicePixelRatio || 1);
        bg.width = Math.floor(innerWidth * DPR);
        bg.height = Math.floor(innerHeight * DPR);
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

        const cssW = innerWidth;
        const cssH = innerHeight;

        fontSize = mqSmall.matches ? 12 : (mqMobile.matches ? 13 : 14);
        const step = mqSmall.matches ? 1.8 : (mqMobile.matches ? 1.4 : 0.9);
        colWidth = Math.max(10, Math.floor(fontSize * step));
        const cols = Math.floor(cssW / colWidth);
        const minSpeed = mqMobile.matches ? 30 : 55;
        const maxSpeed = mqMobile.matches ? 75 : 140;
        const minDensity = mqMobile.matches ? .26 : .45;
        const maxDensity = mqMobile.matches ? .48 : .75;

        columns = Array.from({ length:cols }, (_, i) => ({
          x: i * colWidth,
          y: rand(-cssH, 0),
          speed: rand(minSpeed, maxSpeed),
          density: rand(minDensity, maxDensity),
          seed: Math.random() * 9999
        }));

        cachedFont = `${fontSize}px ${monoFamily}`;

        ctx.fillStyle = "#050607";
        ctx.fillRect(0, 0, cssW, cssH);
      }

      function pickLine(){
        if(Math.random() < 0.08) return keywords[randi(0, keywords.length - 1)];
        const len = randi(mqMobile.matches ? 6 : 8, mqMobile.matches ? 14 : 22);
        let s = "";
        for(let i = 0; i < len; i++) s += glyphs[randi(0, glyphs.length - 1)];
        return s;
      }

      function draw(t){
        if(!running){
          requestAnimationFrame(draw);
          return;
        }

        const cssW = innerWidth;
        const cssH = innerHeight;
        // 60fps на десктопе и matrix-rain с сотней колонок — лишнее.
        // 30 за глаза хватает для ощущения «живого» фона.
        const targetFPS = mqSmall.matches ? 20 : (mqMobile.matches ? 24 : 30);
        const minDt = 1000 / targetFPS;

        if(!lastT) lastT = t;
        const dtMs = t - lastT;
        if(dtMs < minDt){
          requestAnimationFrame(draw);
          return;
        }

        const dt = Math.min(0.06, dtMs / 1000);
        lastT = t;

        ctx.fillStyle = `rgba(5,6,7,${mqMobile.matches ? 0.16 : 0.10})`;
        ctx.fillRect(0, 0, cssW, cssH);
        ctx.font = cachedFont;
        ctx.textBaseline = "top";

        for(const c of columns){
          c.y += c.speed * dt;
          if(Math.random() > c.density) continue;

          const line = pickLine();
          const alpha = rand(0.05, mqMobile.matches ? 0.10 : 0.13);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          const jitter = mqMobile.matches ? 0 : Math.sin((t * 0.001) + c.seed) * 0.6;
          ctx.fillText(line, c.x + jitter, c.y);

          if(c.y > cssH + 40){
            c.y = rand(-cssH * 0.35, -20);
            c.speed = rand(mqMobile.matches ? 30 : 55, mqMobile.matches ? 75 : 140);
            c.density = rand(mqMobile.matches ? .26 : .45, mqMobile.matches ? .48 : .75);
          }
        }

        requestAnimationFrame(draw);
      }

      document.addEventListener("visibilitychange", () => {
        running = !document.hidden;
        if(running) lastT = 0;
      });

      let resizeQueued = false;
      window.addEventListener("resize", () => {
        if(resizeQueued) return;
        resizeQueued = true;
        requestAnimationFrame(() => {
          resizeQueued = false;
          resizeBg();
        });
      }, { passive:true });

      resizeBg();
      if(!reduceMotion) requestAnimationFrame(draw);
    }
  </script>

  <script>
    (function(){
      if(window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      const logo = document.querySelector(".logo");
      if(!logo) return;

      const isMobile = window.matchMedia("(max-width: 820px)").matches;

      const desktopModes = [
        ["glitch-slice-mode"],
        ["glitch-chroma-mode"],
        ["glitch-jitter-mode"],
        ["glitch-ghost-mode"],
        ["glitch-tear-mode"],
        ["glitch-slice-mode", "glitch-chroma-mode"],
        ["glitch-jitter-mode", "glitch-chroma-mode"],
        ["glitch-slice-mode", "glitch-jitter-mode"],
        ["glitch-ghost-mode", "glitch-chroma-mode"],
        ["glitch-tear-mode", "glitch-chroma-mode", "glitch-jitter-mode"]
      ];

      const mobileModes = [
        ["glitch-slice-mode"],
        ["glitch-chroma-mode"],
        ["glitch-jitter-mode"],
        ["glitch-tear-mode"],
        ["glitch-slice-mode", "glitch-jitter-mode"]
      ];

      const modes = isMobile ? mobileModes : desktopModes;

      function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
      function rand(min, max){ return min + Math.random() * (max - min); }

      function runOnce(done){
        if(document.hidden){ done && done(); return; }
        const chosen = pick(modes);
        chosen.forEach(c => logo.classList.add(c));
        const dur = rand(140, isMobile ? 260 : 320);
        setTimeout(() => {
          chosen.forEach(c => logo.classList.remove(c));
          done && done();
        }, dur);
      }

      function schedule(){
        const wait = isMobile ? rand(2800, 9000) : rand(1400, 6800);
        setTimeout(() => {
          if(document.hidden){ schedule(); return; }
          const burst = Math.random();
          const tripleChance = isMobile ? 0 : 0.18;
          const doubleChance = isMobile ? 0.18 : 0.32;
          if(burst < tripleChance){
            runOnce(() => {
              setTimeout(() => {
                runOnce(() => {
                  if(Math.random() < 0.4){
                    setTimeout(() => runOnce(schedule), rand(60, 160));
                  }else{
                    schedule();
                  }
                });
              }, rand(60, 180));
            });
          }else if(burst < doubleChance){
            runOnce(() => {
              setTimeout(() => runOnce(schedule), rand(80, 200));
            });
          }else{
            runOnce(schedule);
          }
        }, wait);
      }

      setTimeout(schedule, 2400);
    })();
  </script>
</body>
</html>
